name: Codex Apply Tracking Patch

on:
  push:
    branches:
      - codex/split-tracking-control

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'run tracking patch applicator')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/split-tracking-control
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply tracking control patch
        run: |
          set -euo pipefail
          base64 -d virtual_control/.codex_tracking_control_split.patch.gz.b64 | gzip -d > /tmp/tracking_control_split.patch
          git apply --check /tmp/tracking_control_split.patch
          git apply /tmp/tracking_control_split.patch
          rm virtual_control/.codex_tracking_control_split.patch.gz.b64
          rm .github/workflows/codex-apply-tracking-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "apply tracking control split patch"
          git push origin HEAD:codex/split-tracking-control
